name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: synqai
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/app
            git pull origin main
            pnpm install --frozen-lockfile
            pm2 restart pm2.config.cjs --update-env || pm2 start pm2.config.cjs
